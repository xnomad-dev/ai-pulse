name: Fetch and Summarize AI News

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser anthropic requests

      - name: Run fetch script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_rss.py

      - name: Commit updated articles
        run: |
          git config user.name "AI Pulse Bot"
          git config user.email "bot@aipulse.dev"
          git add data/articles.json
          git diff --cached --quiet || git commit -m "chore: refresh news $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
