name: Fetch and Summarize AI News

on:
  schedule:
    - cron: '0 13 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-time:
    runs-on: ubuntu-latest
    outputs:
      is_9am_et: ${{ steps.check.outputs.is_9am_et }}
    steps:
      - id: check
        run: |
          HOUR=$(TZ='America/New_York' date +%H)
          if [ "$HOUR" = "09" ]; then
            echo "is_9am_et=true" >> $GITHUB_OUTPUT
          else
            echo "is_9am_et=false" >> $GITHUB_OUTPUT
          fi

  update-news:
    needs: check-time
    if: needs.check-time.outputs.is_9am_et == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser anthropic requests

      - name: Run fetch script
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_rss.py

      - name: Commit updated articles
        run: |
          git config user.name "AI Pulse Bot"
          git config user.email "bot@aipulse.dev"
          git add data/articles.json
          git diff --cached --quiet || git commit -m "chore: refresh news $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
