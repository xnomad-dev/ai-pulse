<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI PULSE — AI News Aggregator</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0a0b0f; --surface: #12141a; --surface2: #1a1d26;
  --border: rgba(255,255,255,0.07); --accent: #4f8eff;
  --accent2: #00e5c4; --accent3: #ff6b6b;
  --text: #f0f2ff; --muted: #7a8099;
  --tag-bg: rgba(79,142,255,0.12); --tag-text: #7db3ff;
}
body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
.header {
  border-bottom: 1px solid var(--border); padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between;
  background: rgba(10,11,15,0.95); position: sticky; top: 0; z-index: 100;
  backdrop-filter: blur(12px);
}
.logo { display: flex; align-items: center; gap: 10px; font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
.logo-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent2); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }
.logo span { color: var(--accent2); }
.header-right { display: flex; align-items: center; gap: 12px; }
.refresh-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted);
  border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px;
  display: flex; align-items: center; gap: 6px;
}
.live-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); animation: pulse 2s infinite; }
.lang-select {
  background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: 'Syne', sans-serif;
  font-size: 12px; padding: 5px 10px; border-radius: 6px; cursor: pointer; outline: none;
}
.main { max-width: 1200px; margin: 0 auto; padding: 24px; }
.hero { padding: 40px 0 32px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
.hero-eyebrow {
  font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--accent);
  letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}
.hero h1 { font-size: clamp(32px,5vw,56px); font-weight: 800; letter-spacing: -2px; line-height: 1.05; }
.hero h1 em { font-style: normal; color: var(--accent); }
.hero-sub { font-size: 15px; color: var(--muted); margin-top: 12px; max-width: 520px; line-height: 1.6; }
.stats-row { display: flex; gap: 32px; margin-top: 28px; flex-wrap: wrap; }
.stat { display: flex; flex-direction: column; gap: 2px; }
.stat-num { font-size: 22px; font-weight: 700; letter-spacing: -1px; }
.stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; }
.controls { display: flex; gap: 10px; align-items: center; margin-bottom: 24px; flex-wrap: wrap; }
.search-wrap { flex: 1; min-width: 200px; position: relative; }
.search-wrap input {
  width: 100%; background: var(--surface); border: 1px solid var(--border);
  color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px;
  padding: 9px 14px 9px 36px; border-radius: 8px; outline: none; transition: border-color 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 14px; pointer-events: none; }
.filter-btn {
  background: var(--surface); border: 1px solid var(--border); color: var(--muted);
  font-family: 'Syne', sans-serif; font-size: 12px; padding: 8px 14px;
  border-radius: 8px; cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.filter-btn:hover, .filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(79,142,255,0.08); }
.tags-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
.tag-pill {
  font-size: 11px; padding: 5px 12px; border-radius: 20px; cursor: pointer;
  transition: all 0.15s; font-family: 'JetBrains Mono', monospace; font-weight: 500;
  border: 1px solid var(--border); color: var(--muted); background: transparent;
}
.tag-pill:hover, .tag-pill.active { background: var(--tag-bg); color: var(--tag-text); border-color: rgba(79,142,255,0.3); }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 16px; }
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; transition: all 0.2s; cursor: pointer; position: relative; overflow: hidden;
}
.card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  opacity: 0; transition: opacity 0.2s;
}
.card:hover { border-color: rgba(79,142,255,0.25); transform: translateY(-2px); }
.card:hover::before { opacity: 1; }
.card-meta { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.source-badge {
  font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted);
  letter-spacing: 0.5px; text-transform: uppercase; display: flex; align-items: center; gap: 6px;
}
.source-dot { width: 6px; height: 6px; border-radius: 50%; }
.time-ago { font-size: 11px; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
.card h3 { font-size: 15px; font-weight: 700; line-height: 1.4; letter-spacing: -0.3px; margin-bottom: 8px; }
.card p { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
.card-tags { display: flex; gap: 6px; flex-wrap: wrap; }
.ctag {
  font-size: 10px; padding: 3px 9px; border-radius: 20px;
  font-family: 'JetBrains Mono', monospace;
  background: var(--tag-bg); color: var(--tag-text); border: 1px solid rgba(79,142,255,0.2);
}
.card-footer {
  margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.read-more { font-size: 11px; color: var(--accent); font-family: 'JetBrains Mono', monospace; text-decoration: none; }
.bookmark-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 14px; padding: 2px; transition: color 0.15s; }
.bookmark-btn.saved { color: var(--accent2); }
.count-bar {
  font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--muted);
  margin-bottom: 16px; padding: 8px 14px; background: var(--surface2);
  border-radius: 6px; border: 1px solid var(--border); display: flex; align-items: center; gap: 8px;
}
.count-bar strong { color: var(--text); }
.load-more { display: flex; justify-content: center; margin-top: 40px; margin-bottom: 60px; }
.load-btn {
  background: var(--surface); border: 1px solid var(--border); color: var(--muted);
  font-family: 'Syne', sans-serif; font-weight: 600; font-size: 13px;
  padding: 12px 28px; border-radius: 8px; cursor: pointer; transition: all 0.2s;
}
.load-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(79,142,255,0.06); }
.empty { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="logo">
      <div class="logo-dot"></div>
      AI<span>PULSE</span>
    </div>
    <div class="header-right">
      <div class="refresh-badge">
        <div class="live-dot"></div>
        <span id="refreshLabel">loading...</span>
      </div>
      <select class="lang-select" id="langSel">
        <option value="en">🌐 English</option>
        <option value="es">🇪🇸 Español</option>
        <option value="fr">🇫🇷 Français</option>
        <option value="de">🇩🇪 Deutsch</option>
        <option value="ja">🇯🇵 日本語</option>
        <option value="zh">🇨🇳 中文</option>
        <option value="pt">🇧🇷 Português</option>
        <option value="hi">🇮🇳 हिन्दी</option>
        <option value="ar">🇸🇦 العربية</option>
        <option value="ko">🇰🇷 한국어</option>
        <option value="bn">🇧🇩 বাংলা</option>
      </select>
    </div>
  </div>

  <div class="main">
    <div class="hero">
      <div class="hero-eyebrow">
        <span style="width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block;"></span>
        AI intelligence feed — 20 sources — refreshed every 6 hours
      </div>
      <h1>Every <em>AI story</em><br>that matters today</h1>
      <p class="hero-sub">Real-time summaries from top AI sources. Refreshed every 6 hours. Free forever. Open source.</p>
      <div class="stats-row">
        <div class="stat"><div class="stat-num" id="s1">0</div><div class="stat-label">Articles today</div></div>
        <div class="stat"><div class="stat-num">20</div><div class="stat-label">Sources</div></div>
        <div class="stat"><div class="stat-num">6h</div><div class="stat-label">Refresh cycle</div></div>
        <div class="stat"><div class="stat-num">$0</div><div class="stat-label">Cost</div></div>
      </div>
    </div>

    <div class="controls">
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input type="text" placeholder="Search AI news..." id="searchInput" oninput="filterCards()" />
      </div>
      <button class="filter-btn active" onclick="setSort('latest',this)">Latest</button>
      <button class="filter-btn" onclick="setSort('bookmarks',this)">Saved</button>
    </div>

    <div class="tags-row" id="tagsRow"></div>
    <div class="count-bar"><strong id="countNum">0</strong>&nbsp;articles</div>
    <div class="grid" id="grid"></div>
    <div class="load-more"><button class="load-btn" onclick="loadMore()">Load more ↓</button></div>
  </div>
</div>

<script>
let ALL_ARTICLES = [];
let activeTag = "All";
let activeSort = "latest";
let bookmarks = new Set(JSON.parse(localStorage.getItem('aipulse_bm') || '[]'));
let visibleCount = 9;
let searchQ = "";
let allTags = ["All"];

const COLORS = ["#4f8eff","#00e5c4","#ff6b6b","#a78bfa","#fbbf24","#34d399"];

async function loadData() {
  try {
    const res = await fetch('data/articles.json?t=' + Date.now());
    const data = await res.json();
    ALL_ARTICLES = data.articles || [];

    // Update refresh label
    if (data.updated_at) {
      const d = new Date(data.updated_at);
      const diff = Math.round((Date.now() - d) / 60000);
      const label = diff < 60 ? diff + 'm ago' : Math.round(diff/60) + 'h ago';
      document.getElementById('refreshLabel').textContent = 'refreshed ' + label;
    }

    // Update article count stat
    document.getElementById('s1').textContent = ALL_ARTICLES.length;

    // Build tag list
    const tagSet = new Set(["All"]);
    ALL_ARTICLES.forEach(a => (a.tags || []).forEach(t => tagSet.add(t)));
    allTags = [...tagSet].slice(0, 15);

    renderTags();
    renderGrid();
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="empty">No articles yet. Run the GitHub Action to fetch news.</div>';
  }
}

function timeAgo(dateStr) {
  if (!dateStr) return '';
  try {
    const d = new Date(dateStr);
    const diff = Math.round((Date.now() - d) / 60000);
    if (diff < 60) return diff + 'm ago';
    if (diff < 1440) return Math.round(diff/60) + 'h ago';
    return Math.round(diff/1440) + 'd ago';
  } catch(e) { return ''; }
}

function renderTags() {
  document.getElementById('tagsRow').innerHTML = allTags.map(t =>
    `<button class="tag-pill ${t===activeTag?'active':''}" onclick="setTag('${t}')">${t}</button>`
  ).join('');
}

function setTag(t) { activeTag = t; visibleCount = 9; renderTags(); renderGrid(); }

function setSort(s, btn) {
  activeSort = s;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  visibleCount = 9;
  renderGrid();
}

function filterCards() { searchQ = document.getElementById('searchInput').value.toLowerCase(); visibleCount = 9; renderGrid(); }

function getFiltered() {
  let arr = [...ALL_ARTICLES];
  if (activeTag !== "All") arr = arr.filter(a => (a.tags||[]).some(t => t===activeTag));
  if (searchQ) arr = arr.filter(a => a.title.toLowerCase().includes(searchQ) || a.summary.toLowerCase().includes(searchQ));
  if (activeSort === 'bookmarks') arr = arr.filter(a => bookmarks.has(a.id));
  return arr;
}

function renderGrid() {
  const filtered = getFiltered();
  const shown = filtered.slice(0, visibleCount);
  document.getElementById('countNum').textContent = filtered.length;
  if (shown.length === 0) {
    document.getElementById('grid').innerHTML = '<div class="empty">No articles found.</div>';
    return;
  }
  document.getElementById('grid').innerHTML = shown.map((a, i) => {
    const color = COLORS[i % COLORS.length];
    const saved = bookmarks.has(a.id);
    const tagsHTML = (a.tags||[]).map(t => `<span class="ctag">${t}</span>`).join('');
    const ago = timeAgo(a.fetched_at || a.published);
    return `<div class="card">
      <div class="card-meta">
        <div class="source-badge">
          <span class="source-dot" style="background:${color}"></span>
          ${a.source}
        </div>
        <span class="time-ago">${ago}</span>
      </div>
      <h3>${a.title}</h3>
      <p>${a.summary}</p>
      <div class="card-tags">${tagsHTML}</div>
      <div class="card-footer">
        <a class="read-more" href="${a.url}" target="_blank" rel="noopener">Read full story →</a>
        <button class="bookmark-btn ${saved?'saved':''}" onclick="toggleBookmark(${a.id}, this)">
          ${saved ? '★' : '☆'}
        </button>
      </div>
    </div>`;
  }).join('');
}

function toggleBookmark(id, btn) {
  if (bookmarks.has(id)) { bookmarks.delete(id); btn.textContent='☆'; btn.classList.remove('saved'); }
  else { bookmarks.add(id); btn.textContent='★'; btn.classList.add('saved'); }
  localStorage.setItem('aipulse_bm', JSON.stringify([...bookmarks]));
}

function loadMore() { visibleCount += 6; renderGrid(); }

loadData();
</script>
</body>
</html>
